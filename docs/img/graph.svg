<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#0e1526"/><stop offset="100%" stop-color="#060810"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="380" fill="url(#bg)"/>

  <!-- links -->
  <g stroke="#7a8cbe" stroke-opacity="0.16" stroke-width="1">
    <line x1="300" y1="190" x2="180" y2="110"/><line x1="300" y1="190" x2="430" y2="110"/>
    <line x1="300" y1="190" x2="150" y2="250"/><line x1="300" y1="190" x2="450" y2="250"/>
    <line x1="300" y1="190" x2="300" y2="300"/><line x1="300" y1="190" x2="470" y2="185"/>
    <line x1="180" y1="110" x2="120" y2="70"/><line x1="180" y1="110" x2="230" y2="60"/><line x1="180" y1="110" x2="110" y2="150"/>
    <line x1="430" y1="110" x2="490" y2="70"/><line x1="430" y1="110" x2="380" y2="60"/>
    <line x1="150" y1="250" x2="90" y2="290"/><line x1="150" y1="250" x2="170" y2="320"/>
    <line x1="450" y1="250" x2="510" y2="290"/><line x1="450" y1="250" x2="430" y2="320"/>
    <line x1="470" y1="185" x2="540" y2="160"/><line x1="470" y1="185" x2="540" y2="210"/>
  </g>

  <!-- leaf nodes -->
  <g filter="url(#glow)">
    <circle cx="120" cy="70" r="5" fill="#37d4cf"/><circle cx="230" cy="60" r="5" fill="#37d4cf"/><circle cx="110" cy="150" r="5" fill="#37d4cf"/>
    <circle cx="490" cy="70" r="6" fill="#b08cff"/><circle cx="380" cy="60" r="6" fill="#b08cff"/>
    <circle cx="90" cy="290" r="5" fill="#4fd89a"/><circle cx="170" cy="320" r="5" fill="#4fd89a"/>
    <circle cx="510" cy="290" r="6" fill="#ff6f92"/><circle cx="430" cy="320" r="6" fill="#ff6f92"/>
    <circle cx="540" cy="160" r="4" fill="#ff8a5c"/><circle cx="540" cy="210" r="4" fill="#ff8a5c"/><circle cx="300" cy="300" r="5" fill="#f5a04b"/>
  </g>
  <!-- secret halos -->
  <circle cx="490" cy="70" r="10" fill="none" stroke="#ff6f92" stroke-width="1.2" opacity="0.8"/>
  <circle cx="510" cy="290" r="11" fill="none" stroke="#ff6f92" stroke-width="1.2" opacity="0.8"/>

  <!-- hubs -->
  <g filter="url(#glow)">
    <circle cx="180" cy="110" r="9" fill="#37d4cf"/><circle cx="430" cy="110" r="9" fill="#b08cff"/>
    <circle cx="150" cy="250" r="9" fill="#4fd89a"/><circle cx="450" cy="250" r="9" fill="#ff6f92"/>
    <circle cx="470" cy="185" r="9" fill="#ff8a5c"/>
  </g>
  <!-- core -->
  <circle cx="300" cy="190" r="26" fill="#ffd98a" opacity="0.25" filter="url(#glow)"/>
  <circle cx="300" cy="190" r="17" fill="#ffd98a" filter="url(#glow)"/>
  <text x="300" y="234" fill="#eaf0ff" font-size="12" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700">Davids-iMac</text>

  <text x="30" y="352" fill="#cdd6ec" font-size="14" font-weight="700" font-family="system-ui,sans-serif">Visualize this Mac 🌌</text>
  <text x="30" y="372" fill="#63708f" font-size="11">replace with docs/img/graph.png — SceneKit 3D, drag to orbit</text>
</svg>
