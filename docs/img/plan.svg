<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <rect width="600" height="380" fill="#0e1424"/>
  <text x="32" y="44" fill="#63708f" font-size="10" letter-spacing="3">MIGRATION PLAN</text>
  <text x="32" y="70" fill="#fff" font-size="20" font-weight="700" font-family="system-ui,sans-serif">Choose what moves</text>

  <!-- rows -->
  <g font-size="13">
    <!-- repo -->
    <circle cx="40" cy="112" r="7" fill="#37d4cf"/>
    <text x="60" y="117" fill="#cdd6ec">panogram</text>
    <rect x="440" y="103" width="128" height="20" rx="10" fill="#37d4cf" opacity="0.16"/>
    <text x="504" y="117" fill="#37d4cf" font-size="10" text-anchor="middle">git clone</text>
    <!-- env -->
    <circle cx="40" cy="150" r="7" fill="#4fd89a"/>
    <text x="60" y="155" fill="#cdd6ec">shotgundetour/.envrc</text>
    <rect x="452" y="141" width="116" height="20" rx="10" fill="#ff6f92" opacity="0.16"/>
    <text x="510" y="155" fill="#ff6f92" font-size="10" text-anchor="middle">encrypted</text>
    <!-- agent -->
    <circle cx="40" cy="188" r="7" fill="#b08cff"/>
    <circle cx="40" cy="188" r="10" fill="none" stroke="#ff6f92" stroke-width="1.2"/>
    <text x="60" y="193" fill="#cdd6ec">Claude Code memory</text>
    <rect x="452" y="179" width="116" height="20" rx="10" fill="#b08cff" opacity="0.16"/>
    <text x="510" y="193" fill="#b08cff" font-size="10" text-anchor="middle">transfer</text>
    <!-- brew -->
    <circle cx="40" cy="226" r="7" fill="#ff8a5c"/>
    <text x="60" y="231" fill="#cdd6ec">ripgrep</text>
    <rect x="428" y="217" width="140" height="20" rx="10" fill="#ff8a5c" opacity="0.16"/>
    <text x="498" y="231" fill="#ff8a5c" font-size="10" text-anchor="middle">reinstall native</text>
    <!-- beyond brew -->
    <circle cx="40" cy="264" r="7" fill="#ffd257"/>
    <text x="60" y="269" fill="#cdd6ec">Visual Studio Code</text>
    <rect x="426" y="255" width="142" height="20" rx="10" fill="#ffd257" opacity="0.16"/>
    <text x="497" y="269" fill="#ffd257" font-size="10" text-anchor="middle">brew --cask</text>
  </g>

  <rect x="0" y="316" width="600" height="64" fill="#080b14"/>
  <text x="32" y="352" fill="#cdd6ec" font-size="13" font-weight="600" font-family="system-ui,sans-serif">28 of 34 items · 1.4 GB</text>
  <rect x="424" y="332" width="144" height="32" rx="8" fill="#0a84ff"/>
  <text x="496" y="353" fill="#fff" font-size="12" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600">Migrate selected</text>
</svg>
